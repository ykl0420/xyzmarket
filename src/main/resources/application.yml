server:
  port: 8080

spring:
  application:
    name: campus-market
  datasource:
    url: jdbc:mysql://localhost:3306/campus_market?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

# MyBatis 配置（不使用 MyBatis-Plus）
mybatis:
  type-aliases-package: com.example.xyzmarket.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

# 微信小程序配置
wx:
  appid: your_appid
  secret: your_secret

# JWT 配置
jwt:
  secret: your_jwt_secret_key_at_least_256_bits_long_for_security
  expiration: 604800000  # 7天（单位：毫秒）
